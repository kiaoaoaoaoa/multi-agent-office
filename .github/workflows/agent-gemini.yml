name: Agent Gemini

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task_number:
        description: 'Issue number to process'
        required: true

jobs:
  gemini-worker:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'agent:gemini')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read task
        id: task
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ inputs.task_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          gh issue view "$ISSUE_NUM" --json title --jq '.title' > /tmp/issue_title
          gh issue view "$ISSUE_NUM" --json body --jq '.body' > /tmp/issue_body
          echo "title=$(cat /tmp/issue_title)" >> $GITHUB_OUTPUT

      - name: Load context
        run: |
          echo "=== Shared state ==="
          cat agents/state.json 2>/dev/null | jq . || echo "  (none)"
          echo "=== Other agent results ==="
          ls -la agents/results/ 2>/dev/null || echo "  (none)"

      - name: Execute Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set in GitHub Secrets" > /tmp/gemini_output.txt
            exit 0
          fi

          STATE=$(cat agents/state.json 2>/dev/null || echo "{}")
          TASK=$(cat /tmp/issue_body)
          PROMPT="You are the 'External Communications Department' AI agent. Role: draft client emails, negotiation strategies, customer response scripts. Current shared state: $STATE. Task: $TASK. Respond in Korean JSON format."

          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              contents: [{parts: [{text: $prompt}]}]
            }')" | jq '.candidates[0].content.parts[0].text' -r > /tmp/gemini_output.txt 2>/dev/null || echo "API call failed" > /tmp/gemini_output.txt

          echo "=== Gemini response ==="
          cat /tmp/gemini_output.txt
        continue-on-error: true

      - name: Save result
        run: |
          ISSUE_NUM="${{ steps.task.outputs.issue_number }}"
          NOW=$(date +%Y%m%d-%H%M)
          RESULT_FILE="agents/results/gemini-${NOW}-task${ISSUE_NUM}.md"

          mkdir -p agents/results
          {
            echo "# Task #${ISSUE_NUM}: ${{ steps.task.outputs.title }}"
            echo ""
            echo "**Timestamp:** $(date -Iseconds)"
            echo ""
            echo "## Result"
            cat /tmp/gemini_output.txt
          } > "$RESULT_FILE"

          git config user.name "gemini[bot]"
          git config user.email "gemini@agents.local"
          git add "$RESULT_FILE"
          git commit -m "Gemini: completed task #${ISSUE_NUM}"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main

      - name: Report back
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Gemini completed task"
            echo ""
            cat /tmp/gemini_output.txt
            echo ""
            echo "Result: agents/results/gemini-$(date +%Y%m%d-%H%M)-task${{ steps.task.outputs.issue_number }}.md"
          } > /tmp/comment_body

          gh issue comment "${{ steps.task.outputs.issue_number }}" --body-file /tmp/comment_body
