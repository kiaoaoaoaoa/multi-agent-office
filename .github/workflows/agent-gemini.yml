name: рҹӨ– Agent Gemini

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task_number:
        description: 'мІҳлҰ¬н•  Issue лІҲнҳё'
        required: true

jobs:
  gemini-worker:
    if: |
      github.event.label.name == 'agent:gemini' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: рҹ“– Read task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ inputs.task_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

          TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
          BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<BODYEOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "BODYEOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: рҹ“Ҙ Load context
        run: |
          echo "=== нҳ„мһ¬ shared_state.json ==="
          cat agents/state.json 2>/dev/null | jq . || echo "  (м—ҶмқҢ)"

          echo "=== Claude мөңк·ј кІ°кіј ==="
          ls -la agents/results/claude-* 2>/dev/null | tail -3 || echo "  (м—ҶмқҢ)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: рҹ§  Execute Gemini (Google API)
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "вҡ пёҸ  GEMINI_API_KEYк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ."
            echo "GitHub Secretsм—җ GEMINI_API_KEYлҘј л“ұлЎқн•ҙмЈјм„ёмҡ”."
            exit 0
          fi

          PROMPT="лӢ№мӢ мқҖ 'лҢҖмҷё м»Өл®ӨлӢҲмјҖмқҙм…ҳ л¶Җм„ң'мқҳ AI м—җмқҙм „нҠёмһ…лӢҲлӢӨ.
        м—ӯн• : кұ°лһҳмІҳ м—°лқҪ, мқҙл©”мқј мҙҲм•Ҳ, нҳ‘мғҒ м „лһө, кі к°қ мқ‘лҢҖ мҠӨнҒ¬лҰҪнҠёлҘј мһ‘м„ұн•©лӢҲлӢӨ.

        кіөмң  мғҒнғң: $(cat agents/state.json 2>/dev/null || echo '{}')

        мһ‘м—… лӮҙмҡ©:
        ${{ steps.task.outputs.body }}

        JSON нҳ•мӢқмңјлЎң мқ‘лӢө:
        {
          \"action\": \"completed|blocked|need_info\",
          \"result\": \"мһ‘м—… кІ°кіј\",
          \"output_file\": \"agents/results/gemini-YYYYMMDD-HHMM.md\",
          \"depends_on\": [],
          \"next_steps\": \"лӢӨмқҢ н–үлҸҷ\"
        }"

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              contents: [{parts: [{text: $prompt}]}]
            }')")

          echo "$RESPONSE" | jq '.candidates[0].content.parts[0].text' -r > /tmp/gemini_output.txt
          cat /tmp/gemini_output.txt
        continue-on-error: true

      - name: рҹ’ҫ Save result
        run: |
          ISSUE_NUM="${{ steps.task.outputs.issue_number }}"
          RESULT_FILE="agents/results/gemini-$(date +%Y%m%d-%H%M)-task${ISSUE_NUM}.md"

          mkdir -p agents/results
          echo "# мһ‘м—… #${ISSUE_NUM}: ${{ steps.task.outputs.title }}" > "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "**мІҳлҰ¬ мӢңк°Ғ:** $(date -Iseconds)" >> "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "## кІ°кіј" >> "$RESULT_FILE"
          cat /tmp/gemini_output.txt >> "$RESULT_FILE" 2>/dev/null || echo "_API нҳём¶ң мӢӨнҢЁ лҳҗлҠ” нӮӨ лҜём„Өм •_" >> "$RESULT_FILE"

          git config user.name "gemini[bot]"
          git config user.email "gemini@agents.local"
          git add "$RESULT_FILE"
          git commit -m "рҹ“һ Gemini: мһ‘м—… #${ISSUE_NUM} мҷ„лЈҢ"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main

      - name: рҹ’¬ Report back
        run: |
          gh issue comment "${{ steps.task.outputs.issue_number }}" \
            --body "$(cat << 'EOF'
        ## вң… Gemini мһ‘м—… мҷ„лЈҢ

        $(cat /tmp/gemini_output.txt 2>/dev/null || echo "мІҳлҰ¬ кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ.")

        рҹ“Ғ кІ°кіј нҢҢмқј: `agents/results/gemini-$(date +%Y%m%d-%H%M)-task${{ steps.task.outputs.issue_number }}.md`
        EOF
        )"
        env:
          GH_TOKEN: ${{ github.token }}
