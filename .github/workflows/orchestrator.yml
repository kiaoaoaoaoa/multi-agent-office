name: Orchestrator

on:
  schedule:
    - cron: '*/5 * * * *'
  issues:
    types: [opened, labeled, unlabeled, edited]
  workflow_dispatch:

jobs:
  scan-and-assign:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan open issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Current tasks ==="
          gh issue list --state open --json number,title,labels,assignees,updatedAt \
            | jq -r '.[] | "  #\(.number) [\(.labels[].name // "no-label")] \(.title)"'

      - name: Find unassigned tasks
        id: unassigned
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UNASSIGNED=$(gh issue list --state open --json number,title,labels \
            --jq '[.[] | select(.assignees | length == 0)]')
          echo "unassigned_count=$(echo "$UNASSIGNED" | jq 'length')" >> $GITHUB_OUTPUT
          if [ "$(echo "$UNASSIGNED" | jq 'length')" -gt 0 ]; then
            echo "Unassigned tasks found:"
            echo "$UNASSIGNED" | jq -r '.[] | "  #\(.number) \(.title)"'
          fi

      - name: Auto-assign by label
        if: steps.unassigned.outputs.unassigned_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --state open --json number,labels --jq '
            .[] | select(.labels | any(.name; startswith("agent:"))) |
            "#\(.number):\(.labels | map(select(.name | startswith("agent:"))) | .[0].name)"
          ' > /tmp/agent_map.txt

          while IFS=: read -r number agent; do
            case "$agent" in
              "agent:claude")   ASSIGNEE="anthropic-claude" ;;
              "agent:gemini")   ASSIGNEE="google-gemini" ;;
              "agent:codex")    ASSIGNEE="openai-codex" ;;
              *)                ASSIGNEE="" ;;
            esac
            if [ -n "$ASSIGNEE" ]; then
              gh issue edit "$number" --add-assignee "$ASSIGNEE" 2>/dev/null || true
              echo "  Assigned #$number -> $agent ($ASSIGNEE)"
            fi
          done < /tmp/agent_map.txt

      - name: Update shared state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > agents/state.json << STATEEOF
          {
            "updated_at": "${NOW}",
            "orchestrator": "active",
            "agents": {
              "claude": { "status": "idle", "current_task": null },
              "gemini": { "status": "idle", "current_task": null },
              "codex": { "status": "idle", "current_task": null }
            }
          }
          STATEEOF

          ACTIVE_TASKS=$(gh issue list --state open --json number,title,labels,assignees \
            --jq '[.[] | {number, title, labels: [.labels[].name], assignees: [.assignees[].login]}]')

          echo "$ACTIVE_TASKS" | jq . > tasks/active.json

          for agent in claude gemini codex; do
            TASK=$(echo "$ACTIVE_TASKS" | jq -r --arg a "$agent" \
              '[.[] | select(.labels | any(. == "agent:\($a)"))][0]')
            if [ "$TASK" != "null" ] && [ -n "$TASK" ]; then
              TASK_NUM=$(echo "$TASK" | jq -r '.number')
              TMP_FILE=$(mktemp)
              jq --arg a "$agent" --arg t "$TASK_NUM" \
                '.agents[$a].status = "working" | .agents[$a].current_task = $t' \
                agents/state.json > "$TMP_FILE"
              mv "$TMP_FILE" agents/state.json
            fi
          done

      - name: Commit state changes
        run: |
          git config user.name "orchestrator[bot]"
          git config user.email "orchestrator@agents.local"
          git add agents/state.json tasks/active.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "orchestrator: state sync ($(date +%H:%M))"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          fi

      - name: Cross-agent notifications
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMPLETED=$(gh issue list --state closed --label "agent:gemini" \
            --json number,title --jq '.[] | "#\(.number) \(.title)"' --limit 5)

          if [ -n "$COMPLETED" ]; then
            CLAUDE_TASKS=$(gh issue list --state open --label "agent:claude" \
              --json number --jq '.[].number')
            for num in $CLAUDE_TASKS; do
              BODY=$(gh issue view "$num" --json body --jq '.body')
              if echo "$BODY" | grep -q "depends-on:.*gemini"; then
                echo "Gemini tasks completed. Ready to proceed." > /tmp/notif_body
                echo "" >> /tmp/notif_body
                echo "$COMPLETED" >> /tmp/notif_body
                gh issue comment "$num" --body-file /tmp/notif_body
              fi
            done
          fi
