name: 🤖 Agent Codex

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task_number:
        description: '처리할 Issue 번호'
        required: true

jobs:
  codex-worker:
    if: |
      github.event.label.name == 'agent:codex' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 📖 Read task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ inputs.task_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

          TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
          BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<BODYEOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "BODYEOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 📥 Load context
        run: |
          echo "=== 현재 shared_state.json ==="
          cat agents/state.json 2>/dev/null | jq . || echo "  (없음)"

          echo "=== 다른 에이전트 최근 결과 ==="
          ls -la agents/results/ 2>/dev/null || echo "  (없음)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🧠 Execute Codex (OpenAI API)
        id: codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️  OPENAI_API_KEY가 설정되지 않았습니다."
            echo "GitHub Secrets에 OPENAI_API_KEY를 등록해주세요."
            exit 0
          fi

          PROMPT="당신은 '정보수집/리서치 부서'의 AI 에이전트입니다.
        역할: 고객사 정보 조사, 시장 리서치, 데이터 수집 및 분석.

        공유 상태: $(cat agents/state.json 2>/dev/null || echo '{}')

        작업 내용:
        ${{ steps.task.outputs.body }}

        JSON 형식으로 응답:
        {
          \"action\": \"completed|blocked|need_info\",
          \"result\": \"작업 결과\",
          \"output_file\": \"agents/results/codex-YYYYMMDD-HHMM.md\",
          \"depends_on\": [],
          \"next_steps\": \"다음 행동\"
        }"

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              model: "gpt-4o",
              messages: [{role: "user", content: $prompt}],
              temperature: 0.7
            }')")

          echo "$RESPONSE" | jq '.choices[0].message.content' -r > /tmp/codex_output.txt
          cat /tmp/codex_output.txt
        continue-on-error: true

      - name: 💾 Save result
        run: |
          ISSUE_NUM="${{ steps.task.outputs.issue_number }}"
          RESULT_FILE="agents/results/codex-$(date +%Y%m%d-%H%M)-task${ISSUE_NUM}.md"

          mkdir -p agents/results
          echo "# 작업 #${ISSUE_NUM}: ${{ steps.task.outputs.title }}" > "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "**처리 시각:** $(date -Iseconds)" >> "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "## 결과" >> "$RESULT_FILE"
          cat /tmp/codex_output.txt >> "$RESULT_FILE" 2>/dev/null || echo "_API 호출 실패 또는 키 미설정_" >> "$RESULT_FILE"

          git config user.name "codex[bot]"
          git config user.email "codex@agents.local"
          git add "$RESULT_FILE"
          git commit -m "🔍 Codex: 작업 #${ISSUE_NUM} 완료"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main

      - name: 💬 Report back
        run: |
          gh issue comment "${{ steps.task.outputs.issue_number }}" \
            --body "$(cat << 'EOF'
        ## ✅ Codex 작업 완료

        $(cat /tmp/codex_output.txt 2>/dev/null || echo "처리 결과가 없습니다.")

        📁 결과 파일: `agents/results/codex-$(date +%Y%m%d-%H%M)-task${{ steps.task.outputs.issue_number }}.md`
        EOF
        )"
        env:
          GH_TOKEN: ${{ github.token }}
