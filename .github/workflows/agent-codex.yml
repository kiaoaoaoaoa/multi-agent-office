name: рҹӨ– Agent Codex

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task_number:
        description: 'мІҳлҰ¬н•  Issue лІҲнҳё'
        required: true

jobs:
  codex-worker:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'agent:codex')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: рҹ“– Read task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ inputs.task_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

          TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
          BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<BODYEOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "BODYEOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: рҹ“Ҙ Load context
        run: |
          echo "=== нҳ„мһ¬ shared_state.json ==="
          cat agents/state.json 2>/dev/null | jq . || echo "  (м—ҶмқҢ)"

          echo "=== лӢӨлҘё м—җмқҙм „нҠё мөңк·ј кІ°кіј ==="
          ls -la agents/results/ 2>/dev/null || echo "  (м—ҶмқҢ)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: рҹ§  Execute Codex (OpenAI API)
        id: codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "вҡ пёҸ  OPENAI_API_KEYк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ."
            echo "GitHub Secretsм—җ OPENAI_API_KEYлҘј л“ұлЎқн•ҙмЈјм„ёмҡ”."
            exit 0
          fi

          PROMPT="лӢ№мӢ мқҖ 'м •ліҙмҲҳм§‘/лҰ¬м„ңм№ҳ л¶Җм„ң'мқҳ AI м—җмқҙм „нҠёмһ…лӢҲлӢӨ.
        м—ӯн• : кі к°қмӮ¬ м •ліҙ мЎ°мӮ¬, мӢңмһҘ лҰ¬м„ңм№ҳ, лҚ°мқҙн„° мҲҳм§‘ л°Ҹ л¶„м„қ.

        кіөмң  мғҒнғң: $(cat agents/state.json 2>/dev/null || echo '{}')

        мһ‘м—… лӮҙмҡ©:
        ${{ steps.task.outputs.body }}

        JSON нҳ•мӢқмңјлЎң мқ‘лӢө:
        {
          \"action\": \"completed|blocked|need_info\",
          \"result\": \"мһ‘м—… кІ°кіј\",
          \"output_file\": \"agents/results/codex-YYYYMMDD-HHMM.md\",
          \"depends_on\": [],
          \"next_steps\": \"лӢӨмқҢ н–үлҸҷ\"
        }"

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              model: "gpt-4o",
              messages: [{role: "user", content: $prompt}],
              temperature: 0.7
            }')")

          echo "$RESPONSE" | jq '.choices[0].message.content' -r > /tmp/codex_output.txt
          cat /tmp/codex_output.txt
        continue-on-error: true

      - name: рҹ’ҫ Save result
        run: |
          ISSUE_NUM="${{ steps.task.outputs.issue_number }}"
          RESULT_FILE="agents/results/codex-$(date +%Y%m%d-%H%M)-task${ISSUE_NUM}.md"

          mkdir -p agents/results
          echo "# мһ‘м—… #${ISSUE_NUM}: ${{ steps.task.outputs.title }}" > "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "**мІҳлҰ¬ мӢңк°Ғ:** $(date -Iseconds)" >> "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "## кІ°кіј" >> "$RESULT_FILE"
          cat /tmp/codex_output.txt >> "$RESULT_FILE" 2>/dev/null || echo "_API нҳём¶ң мӢӨнҢЁ лҳҗлҠ” нӮӨ лҜём„Өм •_" >> "$RESULT_FILE"

          git config user.name "codex[bot]"
          git config user.email "codex@agents.local"
          git add "$RESULT_FILE"
          git commit -m "рҹ”Қ Codex: мһ‘м—… #${ISSUE_NUM} мҷ„лЈҢ"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main

      - name: рҹ’¬ Report back
        run: |
          gh issue comment "${{ steps.task.outputs.issue_number }}" \
            --body "$(cat << 'EOF'
        ## вң… Codex мһ‘м—… мҷ„лЈҢ

        $(cat /tmp/codex_output.txt 2>/dev/null || echo "мІҳлҰ¬ кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ.")

        рҹ“Ғ кІ°кіј нҢҢмқј: `agents/results/codex-$(date +%Y%m%d-%H%M)-task${{ steps.task.outputs.issue_number }}.md`
        EOF
        )"
        env:
          GH_TOKEN: ${{ github.token }}
